version: 2
updates:
  - package-ecosystem: npm
    directory: /control-plane
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - control-plane

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
